name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Forge ${{ github.ref_name }}"
          releaseBody: "Building..."
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') || github.ref_name == 'v0.5.33' }}

  update-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version and previous tag
        id: vars
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          echo "prev_tag=${PREV_TAG:-}" >> "$GITHUB_OUTPUT"

      - name: Get release assets
        id: assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wait briefly for assets to finalize
          sleep 10

          gh release view "$GITHUB_REF_NAME" --json assets > /tmp/release-assets.json

          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          assets = json.loads(Path("/tmp/release-assets.json").read_text())["assets"]

          def normalize_label(name: str) -> str:
            lower = name.lower()
            if lower.endswith(".exe"):
              return "Windows EXE (ZIP)"
            if lower.endswith(".dmg"):
              return "macOS DMG (ZIP)"
            return ""

          lines = []
          for asset in assets:
            label = normalize_label(asset["name"])
            if not label:
              continue
            lines.append(f"- **{label}:** [{asset['name']}]({asset['url']})")

          print("downloads<<EOF")
          print("\n".join(lines))
          print("EOF")
          PY

      - name: Build changelog
        id: changelog
        run: |
          PREV_TAG="${{ steps.vars.outputs.prev_tag }}"
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" -- . ':!.github' | grep -v 'Co-Authored-By' | head -20 > /tmp/changelog.txt
          else
            echo "- Initial release" > /tmp/changelog.txt
          fi

      - name: Update release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          PREV_TAG="${{ steps.vars.outputs.prev_tag }}"
          DOWNLOADS="${{ steps.assets.outputs.downloads }}"

          CHANGELOG=$(cat /tmp/changelog.txt)

          if [ -z "$DOWNLOADS" ]; then
            DOWNLOADS="- Build artifacts are still processing."
          fi

          # Build comparison link
          COMPARE=""
          if [ -n "$PREV_TAG" ]; then
            COMPARE="
          **Full Changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}"
          fi

          BODY="## What's New

          $CHANGELOG

          ## Download
          $DOWNLOADS

          $COMPARE"

          # Strip leading whitespace from heredoc indentation
          BODY=$(echo "$BODY" | sed 's/^          //')

          gh release edit "${{ github.ref_name }}" --notes "$BODY"
