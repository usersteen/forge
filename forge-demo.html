<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge — Interactive Demo</title>
<style>
/* ===== GLOBAL.CSS (from the real app) ===== */
:root {
  --bg-deep: #080c14;
  --bg-sidebar: #0a0f1a;
  --bg-active: #111b2e;
  --border: #1e293b;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #475569;
  --accent-idle: #64748b;
  --accent-active: #60a5fa;
  --accent-working: #ef4444;
  --accent-waiting: #f59e0b;
  --accent-server: #3b82f6;
  --heat-0: #475569;
  --heat-1: #f59e0b;
  --heat-2: #ea580c;
  --heat-3: #dc2626;
  --heat-4: #ef4444;
  --heat-5: #b91c1c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg-deep);
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: var(--text-primary);
  font-size: 13px;
}

.app-layout {
  display: grid;
  grid-template-columns: 200px 1fr;
  width: 100vw; height: 100vh;
}

.main-panel {
  display: flex; flex-direction: column; overflow: hidden;
  border: 1px solid transparent; border-left: none;
}

.status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent-idle);
}
.status-dot.working {
  background: var(--accent-working);
  animation: glow-working 1.5s ease-in-out infinite;
}
.sidebar-dot.working {
  background: var(--accent-working);
  animation: glow-working-small 1.5s ease-in-out infinite;
}
.status-dot.waiting {
  background: var(--accent-waiting);
  box-shadow: 0 0 4px var(--accent-waiting);
}
.sidebar-dot.waiting {
  background: var(--accent-waiting);
  box-shadow: 0 0 3px var(--accent-waiting);
}
.status-dot.server-running, .sidebar-dot.server-running {
  background: var(--accent-server);
}

@keyframes glow-working {
  0%, 100% { box-shadow: 0 0 4px var(--accent-working), 0 0 8px var(--accent-working); }
  50% { box-shadow: 0 0 8px var(--accent-working), 0 0 16px var(--accent-working), 0 0 24px var(--accent-working); }
}
@keyframes glow-working-small {
  0%, 100% { box-shadow: 0 0 3px var(--accent-working); }
  50% { box-shadow: 0 0 6px var(--accent-working), 0 0 12px var(--accent-working); }
}

.sidebar {
  background: var(--bg-sidebar);
  border: 1px solid transparent; border-right-color: var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  user-select: none; position: relative;
}

.sidebar-header {
  height: 44px; padding: 0 16px;
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border);
  position: relative; overflow: visible;
  transition: background 0.5s ease-out, border-color 0.5s ease-out;
}
.sidebar-header.forge-heat-1 { background: rgba(245, 158, 11, 0.06); }
.sidebar-header.forge-heat-2 { background: rgba(234, 88, 12, 0.10); }
.sidebar-header.forge-heat-3 { background: rgba(220, 38, 38, 0.13); }
.sidebar-header.forge-heat-4 { background: rgba(239, 68, 68, 0.16); }
.sidebar-header.forge-heat-5 { background: rgba(185, 28, 28, 0.20); }
.sidebar-header.forge-heat-3 { box-shadow: 0 1px 4px rgba(220, 38, 38, 0.2); }
.sidebar-header.forge-heat-4 { box-shadow: inset 0 0 0 1px #b91c1c, 0 0 6px rgba(185, 28, 28, 0.4); }
.sidebar-header.forge-heat-5 { border-bottom-color: #b91c1c; box-shadow: 0 0 6px rgba(185, 28, 28, 0.4); }

.sidebar-logo {
  display: flex; justify-content: space-between; align-items: center;
  width: 100%; transition: filter 0.5s ease-out;
}
.sidebar-logo svg { height: 16px; width: auto; }
.sidebar-logo-heat-1 { filter: drop-shadow(0 0 3px var(--heat-1)); }
.sidebar-logo-heat-2 { filter: drop-shadow(0 0 5px var(--heat-2)); }
.sidebar-logo-heat-3 { filter: drop-shadow(0 0 6px var(--heat-3)) drop-shadow(0 0 3px var(--heat-3)); }
.sidebar-logo-heat-4 { filter: drop-shadow(0 0 8px var(--heat-4)) drop-shadow(0 0 4px var(--heat-4)); }
.sidebar-logo-heat-5 { filter: drop-shadow(0 0 6px var(--heat-5)) drop-shadow(0 0 12px var(--heat-5)); }

.sidebar-groups { flex: 1; overflow-y: auto; }

.sidebar-group {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; cursor: pointer;
  border-right: 3px solid transparent; transition: background 0.1s;
}
.sidebar-group:hover { background: var(--bg-active); }
.sidebar-group-active { background: var(--bg-active); border-right-color: var(--accent-active); }
.sidebar-group-active .sidebar-group-name { color: var(--text-primary); }
.sidebar-group-active.sidebar-group-waiting { border-right-color: var(--accent-waiting) !important; }
.sidebar-group-active.sidebar-group-working { border-right-color: var(--accent-working) !important; }

.sidebar-group-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
.sidebar-group-name { color: var(--text-secondary); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-group-dots { display: flex; gap: 4px; padding: 2px 0; }
.sidebar-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-idle); flex-shrink: 0; }

.sidebar-add {
  background: rgba(255, 255, 255, 0.04); border: none; color: var(--text-secondary);
  padding: 10px 16px; margin: 8px; border-radius: 6px; cursor: pointer;
  text-align: center; font-size: 13px; font-family: inherit;
  transition: color 0.1s, background 0.1s;
}
.sidebar-add:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.08); }

.sidebar-actions {
  display: flex; justify-content: center; gap: 4px; padding: 8px 16px;
}
.sidebar-action-btn {
  background: none; border: none; color: var(--text-muted);
  padding: 6px 10px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: color 0.1s; border-radius: 4px;
}
.sidebar-action-btn:hover { color: var(--text-primary); }

.tab-bar {
  display: flex; align-items: stretch; height: 44px;
  background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
  padding: 0 4px 0 0; user-select: none; flex-shrink: 0;
  position: relative; overflow: hidden;
}
.tab-list { display: flex; flex: 1; overflow-x: auto; gap: 0; align-items: stretch; }
.tab-list::-webkit-scrollbar { display: none; }

.tab {
  display: flex; align-items: center; gap: 8px; padding: 0 12px;
  cursor: pointer; border-bottom: 2px solid transparent;
  white-space: nowrap; color: var(--text-secondary);
  transition: background 0.1s, color 0.1s; min-width: 0;
}
.tab:hover { background: var(--bg-active); color: var(--text-primary); }
.tab-active { color: var(--text-primary); border-bottom-color: var(--accent-active); background: var(--bg-active); }
.tab-active.tab-waiting { border-bottom-color: var(--accent-waiting) !important; }
.tab-active.tab-working { border-bottom-color: var(--accent-working) !important; }
.tab-name { overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
.tab-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 14px; cursor: pointer; padding: 0 2px; line-height: 1;
  opacity: 0; transition: opacity 0.1s;
}
.tab:hover .tab-close { opacity: 1; }
.tab-close:hover { color: var(--text-primary); }

.tab-add {
  background: none; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer; padding: 4px 10px; line-height: 1;
  flex-shrink: 0; transition: color 0.1s;
}
.tab-add:hover { color: var(--text-primary); }

.window-controls { display: flex; flex-shrink: 0; margin-left: auto; height: 100%; align-items: stretch; }
.window-control {
  background: none; border: none; color: var(--text-secondary);
  width: 46px; height: 32px; display: flex; align-items: center;
  justify-content: center; cursor: default; font-size: 12px;
  transition: background 0.1s, color 0.1s; align-self: center;
}

.terminal-area { flex: 1; min-height: 0; position: relative; overflow: hidden; }

/* Ember particles */
.forge-ember {
  position: absolute; bottom: 0; width: 3px; height: 3px;
  border-radius: 50%; background: var(--heat-4);
  pointer-events: none; animation: ember-rise 2s ease-out infinite;
}
@keyframes ember-rise {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  50% { opacity: 0.8; }
  100% { opacity: 0; transform: translateY(var(--ember-rise-h, -20px)) scale(0.3); }
}
@keyframes ember-rise-tall {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  50% { opacity: 0.8; }
  100% { opacity: 0; transform: translateY(var(--ember-rise-h, -80px)) scale(0.3); }
}
.forge-ember-tall {
  position: absolute; bottom: 0; width: 3px; height: 3px;
  border-radius: 50%; background: var(--heat-4);
  pointer-events: none; animation: ember-rise-tall 2.5s ease-out infinite;
}
.forge-ember-wide {
  position: absolute; bottom: 0; width: 3px; height: 3px;
  border-radius: 50%; background: var(--heat-4);
  pointer-events: none; animation: ember-rise 2s ease-out infinite;
}

[data-heat="4"] .forge-ember { --ember-rise-h: -35px; animation-duration: 2.8s; }
[data-heat="5"] .forge-ember { --ember-rise-h: -50px; animation-duration: 3.5s; }
[data-heat="4"] .forge-ember-wide { --ember-rise-h: -35px; animation-duration: 2.8s; }
[data-heat="5"] .forge-ember-wide { --ember-rise-h: -50px; animation-duration: 3.5s; }
[data-heat="4"] .forge-ember-tall { --ember-rise-h: -40vh; animation-duration: 12s; }
[data-heat="5"] .forge-ember-tall { --ember-rise-h: -55vh; animation-duration: 16s; }

@keyframes micro-ember-rise {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  40% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-12px) scale(0.2); }
}
[data-heat="4"] .status-dot.working,
[data-heat="4"] .sidebar-dot.working,
[data-heat="5"] .status-dot.working,
[data-heat="5"] .sidebar-dot.working { position: relative; overflow: visible; }

[data-heat="4"] .status-dot.working::after,
[data-heat="4"] .sidebar-dot.working::after {
  content: ""; position: absolute; top: -2px; left: 3px;
  width: 2px; height: 2px; border-radius: 50%; background: var(--heat-4);
  pointer-events: none; animation: micro-ember-rise 1.6s ease-out infinite;
}
[data-heat="5"] .status-dot.working::before,
[data-heat="5"] .sidebar-dot.working::before {
  content: ""; position: absolute; top: -2px; left: 1px;
  width: 2px; height: 2px; border-radius: 50%; background: var(--heat-4);
  pointer-events: none; animation: micro-ember-rise 1.4s ease-out infinite;
  animation-delay: 0.5s;
}
[data-heat="5"] .status-dot.working::after,
[data-heat="5"] .sidebar-dot.working::after {
  content: ""; position: absolute; top: -2px; left: 5px;
  width: 2px; height: 2px; border-radius: 50%; background: var(--heat-4);
  pointer-events: none; animation: micro-ember-rise 1.8s ease-out infinite;
  animation-delay: 0.2s;
}

[data-heat="5"] .tab-bar { border-bottom-color: #b91c1c; box-shadow: 0 0 6px rgba(185, 28, 28, 0.3); }
[data-heat="5"] .sidebar { border-color: #b91c1c; box-shadow: 0 0 6px rgba(185, 28, 28, 0.3); }
[data-heat="5"] .main-panel { border-top-color: #b91c1c; border-right-color: #b91c1c; border-bottom-color: #b91c1c; }

.app-layout, .sidebar, .tab-bar, .main-panel, .sidebar-group, .sidebar-add, .sidebar-action-btn {
  transition: background-color 0.8s ease, border-color 0.8s ease, color 0.8s ease;
}

[data-heat="0"] { --bg-deep: #080c14; --bg-sidebar: #0a0f1a; --bg-active: #111b2e; --border: #1e293b; }
[data-heat="1"] { --bg-deep: #0a0c12; --bg-sidebar: #0d1018; --bg-active: #151a28; --border: #25293a; }
[data-heat="2"] { --bg-deep: #0c0b10; --bg-sidebar: #100e16; --bg-active: #1a1520; --border: #2e2535; }
[data-heat="3"] { --bg-deep: #0e0a0a; --bg-sidebar: #120d0c; --bg-active: #1e1412; --border: #352220; }
[data-heat="4"] { --bg-deep: #100808; --bg-sidebar: #140b0a; --bg-active: #22120f; --border: #3a1e1a; }
[data-heat="5"] { --bg-deep: #120606; --bg-sidebar: #180808; --bg-active: #28100e; --border: #401815; }

/* ===== DEMO-SPECIFIC STYLES ===== */

/* Demo strip at bottom */
.demo-strip {
  position: fixed; bottom: 0; left: 0; right: 0; height: 36px;
  background: var(--bg-sidebar); border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; padding: 0 12px; z-index: 500;
}
.demo-strip-label {
  color: var(--text-muted); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px;
}
.demo-strip-buttons { display: flex; gap: 4px; }
.demo-strip-btn {
  background: rgba(255, 255, 255, 0.06); border: 1px solid var(--border);
  color: var(--text-secondary); padding: 3px 10px; border-radius: 3px;
  cursor: pointer; font-size: 11px; font-family: inherit;
}
.demo-strip-btn:hover { background: var(--bg-active); color: var(--text-primary); }
.demo-strip-btn-active { background: var(--accent-active); border-color: var(--accent-active); color: #fff; }
.demo-strip-btn-active:hover { background: var(--accent-active); }
.demo-strip-separator { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

/* Fake terminal */
.fake-terminal {
  position: absolute; inset: 0;
  padding: 12px 16px; overflow: hidden;
  background: var(--bg-deep);
}
.fake-terminal pre {
  font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
  font-size: 13px; line-height: 1.5; color: var(--text-secondary);
  white-space: pre-wrap; margin: 0;
}
.fake-terminal .prompt { color: #22c55e; }
.fake-terminal .cmd { color: var(--text-primary); }
.fake-terminal .output { color: var(--text-muted); }
.fake-terminal .accent { color: var(--accent-active); }
.fake-terminal .warn { color: var(--accent-waiting); }
.fake-terminal .err { color: var(--accent-working); }

/* ===== SPLASH ===== */
.splash-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(8, 12, 20, 0.92);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
.splash-card {
  background: var(--bg-sidebar); border: 1px solid var(--border);
  border-radius: 12px; padding: 40px 48px; text-align: center;
  max-width: 440px; width: 90vw;
  animation: splash-in 0.4s ease-out;
}
@keyframes splash-in {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.splash-logo { margin-bottom: 16px; }
.splash-logo svg { height: 28px; width: auto; }
.splash-title {
  font-size: 24px; font-weight: 700; color: var(--text-primary);
  margin-bottom: 8px;
}
.splash-subtitle {
  font-size: 14px; color: var(--text-secondary); line-height: 1.5;
  margin-bottom: 28px;
}
.splash-buttons { display: flex; gap: 12px; justify-content: center; }
.splash-btn {
  padding: 10px 24px; border-radius: 6px; font-size: 14px;
  font-family: inherit; cursor: pointer; font-weight: 500;
  transition: background 0.15s, transform 0.1s;
}
.splash-btn:active { transform: scale(0.97); }
.splash-btn-primary {
  background: var(--accent-active); border: 1px solid var(--accent-active);
  color: #fff;
}
.splash-btn-primary:hover { background: #4d94f7; }
.splash-btn-secondary {
  background: rgba(255, 255, 255, 0.06); border: 1px solid var(--border);
  color: var(--text-secondary);
}
.splash-btn-secondary:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }

/* ===== TOUR OVERLAY ===== */
.tour-backdrop-rect {
  position: fixed; background: rgba(0, 0, 0, 0.65); z-index: 100;
  transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: auto;
}
.tour-highlight {
  position: fixed; z-index: 101;
  border: 2px solid var(--accent-active);
  border-radius: 6px;
  box-shadow: 0 0 12px rgba(96, 165, 250, 0.4), 0 0 24px rgba(96, 165, 250, 0.15);
  pointer-events: none;
  transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}
.tour-callout {
  position: fixed; z-index: 200;
  background: var(--bg-sidebar); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px; width: 320px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.3s ease 0.2s, transform 0.3s ease 0.2s;
}
.tour-callout.visible { opacity: 1; transform: translateY(0); }
.tour-callout-title {
  font-size: 15px; font-weight: 600; color: var(--text-primary);
  margin-bottom: 8px;
}
.tour-callout-body {
  font-size: 13px; color: var(--text-secondary); line-height: 1.5;
  margin-bottom: 16px;
}
.tour-callout-footer {
  display: flex; justify-content: space-between; align-items: center;
}
.tour-callout-nav { display: flex; gap: 8px; }
.tour-nav-btn {
  padding: 6px 14px; border-radius: 4px; font-size: 12px;
  font-family: inherit; cursor: pointer;
  background: rgba(255, 255, 255, 0.06); border: 1px solid var(--border);
  color: var(--text-secondary); transition: background 0.1s, color 0.1s;
}
.tour-nav-btn:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }
.tour-nav-btn-primary {
  background: var(--accent-active); border-color: var(--accent-active); color: #fff;
}
.tour-nav-btn-primary:hover { background: #4d94f7; }
.tour-step-counter { font-size: 11px; color: var(--text-muted); }

.tour-skip-btn {
  position: fixed; top: 12px; right: 16px; z-index: 250;
  background: rgba(255, 255, 255, 0.06); border: 1px solid var(--border);
  color: var(--text-secondary); padding: 6px 14px; border-radius: 4px;
  font-size: 12px; font-family: inherit; cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.tour-skip-btn:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }

/* Interactive mode status cycling cursor */
.sidebar-dot.interactive, .status-dot.interactive { cursor: pointer; }

.demo-disabled {
  opacity: 0.45;
  cursor: not-allowed !important;
  pointer-events: none;
}

.splash-kicker {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 4px 10px;
  margin-bottom: 14px;
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--accent-active);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Hide app when splash is up */
.app-layout.dimmed { filter: blur(2px); pointer-events: none; }
</style>
</head>
<body>
<!-- ===== MOCK FORGE UI ===== -->
<div class="app-layout" id="app" data-heat="0">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header" id="sidebar-header">
      <div class="sidebar-logo" id="sidebar-logo"></div>
    </div>
    <div class="sidebar-groups" id="sidebar-groups"></div>
    <button class="sidebar-add">+ New Project</button>
    <div class="sidebar-actions">
      <button class="sidebar-action-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
      </button>
      <button class="sidebar-action-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="main-panel" id="main-panel">
    <div class="tab-bar" id="tab-bar">
      <div class="tab-list" id="tab-list"></div>
      <div class="window-controls">
        <button class="window-control window-minimize">&#x2013;</button>
        <button class="window-control window-maximize">&#x25A1;</button>
        <button class="window-control window-close">&#x2715;</button>
      </div>
    </div>
    <div class="terminal-area" id="terminal-area">
      <div class="fake-terminal" id="fake-terminal"></div>
    </div>
  </div>
</div>

function applyScenario(name, options = {}) {
  const scenario = SCENARIOS[name];
  if (!scenario) return;

  state.scenario = name;
  state.activeGroupId = scenario.activeGroupId;
  state.groups = cloneGroups(scenario.groups);
  state.heatLevel = options.heatLevel !== undefined ? options.heatLevel : scenario.heatLevel;

  render();
  updateDemoStripActive();
}

// ===== RENDER FUNCTIONS =====

function renderLogo(container, fill) {
  container.innerHTML = LOGO_SVGS.map(s => s.replace(/FILL/g, fill)).join('');
}

function renderSplashLogo() {
  const c = document.getElementById('splash-logo');
  c.innerHTML = LOGO_SVGS.map(s => s.replace(/FILL/g, '#e2e8f0')).join('');
  c.style.display = 'flex';
  c.style.justifyContent = 'center';
  c.style.gap = '2px';
  c.querySelectorAll('svg').forEach(s => { s.style.height = '28px'; s.style.width = 'auto'; });
}

function getActiveGroup() {
  return state.groups.find(g => g.id === state.activeGroupId);
}

function getSidebarDotClass(tab) {
  if (tab.type === 'server') return 'server-running';
  if (tab.status === 'waiting') return 'waiting';
  if (tab.status === 'working') return 'working';
  return '';
}

function getGroupPriorityClass(group) {
  if (group.tabs.some(t => t.status === 'waiting')) return 'sidebar-group-waiting';
  if (group.tabs.some(t => t.status === 'working')) return 'sidebar-group-working';
  return '';
}

function getTabStatusClass(tab) {
  if (tab.status === 'waiting') return 'tab-waiting';
  if (tab.status === 'working') return 'tab-working';
  return '';
}

function getStatusDotClass(tab) {
  if (tab.type === 'server') return 'status-dot server-running';
  if (tab.status === 'waiting') return 'status-dot waiting';
  if (tab.status === 'working') return 'status-dot working';
  return 'status-dot idle';
}

function cycleStatus(tab) {
  const order = ['idle', 'working', 'waiting'];
  if (tab.type === 'server') { tab.type = 'claude'; tab.status = 'idle'; }
  else {
    const idx = order.indexOf(tab.status);
    if (idx === order.length - 1) { tab.type = 'server'; tab.status = 'idle'; }
    else { tab.status = order[idx + 1]; }
  }
}

function render() {
  const app = document.getElementById('app');
  const heat = state.heatLevel;
  app.setAttribute('data-heat', heat);
  const fill = HEAT_COLORS[heat] || HEAT_COLORS[0];

  const sidebarAdd = document.querySelector('.sidebar-add');
  const sidebarButtons = document.querySelectorAll('.sidebar-action-btn');
  const windowButtons = document.querySelectorAll('.window-control');

  sidebarAdd.classList.add('demo-disabled');
  sidebarAdd.setAttribute('disabled', 'disabled');
  sidebarAdd.title = 'Desktop-only control in the web demo';

  sidebarButtons.forEach(btn => {
    btn.classList.add('demo-disabled');
    btn.setAttribute('disabled', 'disabled');
    btn.title = 'Desktop-only control in the web demo';
  });

  windowButtons.forEach(btn => {
    btn.classList.add('demo-disabled');
    btn.setAttribute('disabled', 'disabled');
    btn.title = 'Desktop-only control in the web demo';
  });

  // Logo
  const logoContainer = document.getElementById('sidebar-logo');
  renderLogo(logoContainer, fill);
  logoContainer.className = 'sidebar-logo' + (heat > 0 ? ` sidebar-logo-heat-${heat}` : '');

  // Header heat class
  const header = document.getElementById('sidebar-header');
  header.className = 'sidebar-header' + (heat > 0 ? ` forge-heat-${heat}` : '');

  // Clear old embers from header
  header.querySelectorAll('.forge-ember').forEach(e => e.remove());
  const emberPositions = EMBER_CONFIGS[heat];
  if (emberPositions) {
    emberPositions.forEach((left, i) => {
      const e = document.createElement('span');
      e.className = 'forge-ember';
      e.style.left = `${left}%`;
      e.style.animationDelay = `${(i * 0.4) % 2}s`;
      header.appendChild(e);
    });
  }

  // Sidebar embers
  const sidebar = document.getElementById('sidebar');
  sidebar.querySelectorAll('.forge-ember-tall').forEach(e => e.remove());
  const sidebarEmberCfg = SIDEBAR_EMBER_CONFIGS[heat];
  if (sidebarEmberCfg) {
    sidebarEmberCfg.forEach(([left, delay]) => {
      const e = document.createElement('span');
      e.className = 'forge-ember-tall';
      e.style.left = `${left}%`;
      e.style.animationDelay = `${delay}s`;
      sidebar.appendChild(e);
    });
  }

  // Groups
  const groupsEl = document.getElementById('sidebar-groups');
  groupsEl.innerHTML = state.groups.map(group => {
    const isActive = group.id === state.activeGroupId;
    const priorityClass = getGroupPriorityClass(group);
    const dots = group.tabs.map(tab => {
      const cls = getSidebarDotClass(tab);
      const interactive = state.interactive ? ' interactive' : '';
      return `<span class="sidebar-dot ${cls}${interactive}" data-group="${group.id}" data-tab="${tab.id}"></span>`;
    }).join('');
    return `<div class="sidebar-group ${isActive ? 'sidebar-group-active' : ''} ${priorityClass}" data-group-id="${group.id}">
      <div class="sidebar-group-info">
        <span class="sidebar-group-name">${group.name}</span>
        <div class="sidebar-group-dots">${dots}</div>
      </div>
    </div>`;
  }).join('');

  // Group click handlers
  if (state.interactive) {
    groupsEl.querySelectorAll('.sidebar-group').forEach(el => {
      el.addEventListener('click', () => {
        state.activeGroupId = el.dataset.groupId;
        render();
      });
    });
    groupsEl.querySelectorAll('.sidebar-dot.interactive').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const g = state.groups.find(g => g.id === el.dataset.group);
        const t = g && g.tabs.find(t => t.id === el.dataset.tab);
        if (t) { cycleStatus(t); render(); }
      });
    });
  }

  // Tab bar
  const activeGroup = getActiveGroup();
  const tabList = document.getElementById('tab-list');
  if (activeGroup) {
    tabList.innerHTML = activeGroup.tabs.map(tab => {
      const isActive = tab.id === activeGroup.activeTabId;
      const statusClass = getTabStatusClass(tab);
      return `<div class="tab ${isActive ? 'tab-active' : ''} ${statusClass}" data-tab-id="${tab.id}">
        <span class="${getStatusDotClass(tab)}${state.interactive ? ' interactive' : ''}"></span>
        <span class="tab-name">${tab.name}</span>
      </div>`;
    }).join('') + '<button class="tab-add demo-disabled" disabled title="Desktop-only control in the web demo">+</button>';
  }

  // Tab bar embers
  const tabBar = document.getElementById('tab-bar');
  tabBar.querySelectorAll('.forge-ember-wide').forEach(e => e.remove());
  const tabEmberCfg = TABBAR_EMBER_CONFIGS[heat];
  if (tabEmberCfg) {
    tabEmberCfg.forEach((left, i) => {
      const e = document.createElement('span');
      e.className = 'forge-ember-wide';
      e.style.left = `${left}%`;
      e.style.animationDelay = `${(i * 0.3) % 2}s`;
      tabBar.appendChild(e);
    });
  }

  // Tab click handlers
  if (state.interactive && activeGroup) {
    tabList.querySelectorAll('.tab').forEach(el => {
      el.addEventListener('click', () => {
        activeGroup.activeTabId = el.dataset.tabId;
        render();
      });
    });
    tabList.querySelectorAll('.status-dot.interactive').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const tab = activeGroup.tabs.find(t => t.id === el.closest('.tab').dataset.tabId);
        if (tab) { cycleStatus(tab); render(); }
      });
    });
  }

  // Terminal content
  const terminal = document.getElementById('fake-terminal');
  if (activeGroup) {
    const content = (terminalContent[activeGroup.id] || {})[activeGroup.activeTabId] || '<span class="output">No terminal content</span>';
    terminal.innerHTML = `<pre>${content}</pre>`;
  }
}

    placement: 'bottom',
    onEnter: () => applyScenario('unblock'),
  },
  {
    target: '.sidebar-group-active .sidebar-group-dots',
    title: 'Project Memory',
    body: 'The sidebar keeps every project legible at a glance. Mini dots show where work is moving, where it is blocked, and which group deserves your attention next.',
    placement: 'right',
  },
  {
    target: '#sidebar',
    title: 'Switch Context Without Thrash',
    body: 'Jump between projects without tearing down sessions. Every lane stays where you left it, so changing context costs less and you can keep momentum across multiple efforts.',
    placement: 'right',
    onEnter: () => applyScenario('switch'),
  },
  {
    target: () => document.querySelector('[data-tab-id="dev-server"]'),
    title: 'Dedicated Server Lanes',
    body: 'Long-running processes can live in their own server lanes. They stay visible without pretending to be agent work, which keeps the status model readable.',
    placement: 'bottom',
    onEnter: () => applyScenario('shipping'),
  },
  {
    target: '#terminal-area',
    title: 'Real Terminal Sessions',
    body: 'On desktop, each tab is a real PTY-backed terminal session. Forge layers status detection and notifications on top of the shell you already use for Claude Code, Codex, servers, and builds.',
    placement: 'left',
  },
  {
    target: '#sidebar-header',
    title: 'Focus Has Momentum',
    body: 'When you keep answering prompts and moving the right lane forward, the forge heats up. The UI turns sustained focus into something visible and satisfying.',
    placement: 'right',
    onEnter: () => applyScenario('unblock', { heatLevel: 3 }),
  },
  {
    target: '#app',
    title: 'Working At The Forge',
    body: 'Heat is not the feature. Focus is the feature. The forge metaphor gives shape to the feeling of staying in rhythm while multiple AI lanes move around you.',
    placement: 'center',
    onEnter: () => applyScenario('unblock', { heatLevel: 5 }),
  },
  {
    target: null,
    title: 'Try The Replay',
    body: 'Use the scenario buttons to jump between common focus moments. Switch groups and tabs, cycle status dots, and preview how the forge feels at different heat stages.',
    placement: 'center',
    isFinal: true,
    onEnter: () => applyScenario('shipping'),
  },
];

let currentStep = -1;
let tourActive = false;

function getTargetEl(step) {
  if (!step.target) return null;
  if (typeof step.target === 'function') return step.target();
  return document.querySelector(step.target);
}

function positionBackdrop(rect) {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const pad = 6;

  const els = {
    top: document.getElementById('tour-backdrop-top'),
    right: document.getElementById('tour-backdrop-right'),
    bottom: document.getElementById('tour-backdrop-bottom'),
    left: document.getElementById('tour-backdrop-left'),
  };

  if (!rect) {
    // Full screen dim
    Object.values(els).forEach(e => { e.style.display = 'block'; });
    els.top.style.cssText = `display:block;top:0;left:0;width:${W}px;height:${H}px;`;
    els.right.style.display = 'none';
    els.bottom.style.display = 'none';
    els.left.style.display = 'none';
    return;
  }

  const t = Math.max(0, rect.top - pad);
  const l = Math.max(0, rect.left - pad);
  const b = Math.min(H, rect.bottom + pad);
  const r = Math.min(W, rect.right + pad);

  els.top.style.cssText = `display:block;top:0;left:0;width:${W}px;height:${t}px;`;
  els.right.style.cssText = `display:block;top:${t}px;left:${r}px;width:${W - r}px;height:${b - t}px;`;
  els.bottom.style.cssText = `display:block;top:${b}px;left:0;width:${W}px;height:${H - b}px;`;
  els.left.style.cssText = `display:block;top:${t}px;left:0;width:${l}px;height:${b - t}px;`;
}

function positionHighlight(rect) {
  const hl = document.getElementById('tour-highlight');
  if (!rect) { hl.style.display = 'none'; return; }
  const pad = 6;
  hl.style.display = 'block';
  hl.style.top = `${rect.top - pad}px`;
  hl.style.left = `${rect.left - pad}px`;
  hl.style.width = `${rect.width + pad * 2}px`;
  hl.style.height = `${rect.height + pad * 2}px`;
}

function positionCallout(rect, placement, step) {
  const callout = document.getElementById('tour-callout');
  callout.classList.remove('visible');
  callout.style.display = 'block';

  // Build content
  const isFirst = currentStep === 0;
  const isLast = step.isFinal;

  callout.innerHTML = `
    <div class="tour-callout-title">${step.title}</div>
    <div class="tour-callout-body">${step.body}</div>
    <div class="tour-callout-footer">
      <span class="tour-step-counter">${currentStep + 1} / ${tourSteps.length}</span>
      <div class="tour-callout-nav">
        ${!isFirst ? '<button class="tour-nav-btn" id="tour-prev">Prev</button>' : ''}
        <button class="tour-nav-btn tour-nav-btn-primary" id="tour-next">${isLast ? 'Start Exploring' : 'Next'}</button>
      </div>
    </div>
  `;

  // Position
  const cw = 320; const ch = callout.offsetHeight || 200;
  const gap = 16;
  let top, left;

  if (placement === 'center' || !rect) {
    top = (window.innerHeight - ch) / 2;
    left = (window.innerWidth - cw) / 2;
  } else if (placement === 'right') {
    top = rect.top + (rect.height - ch) / 2;
    left = rect.right + gap + 6;
  } else if (placement === 'left') {
    top = rect.top + (rect.height - ch) / 2;
    left = rect.left - cw - gap - 6;
  } else if (placement === 'bottom') {
    top = rect.bottom + gap + 6;
    left = rect.left + (rect.width - cw) / 2;
  } else if (placement === 'top') {
    top = rect.top - ch - gap - 6;
    left = rect.left + (rect.width - cw) / 2;
  }

  // Clamp to viewport
  top = Math.max(12, Math.min(window.innerHeight - ch - 12, top));
  left = Math.max(12, Math.min(window.innerWidth - cw - 12, left));

  callout.style.top = `${top}px`;
  callout.style.left = `${left}px`;

  // Wire nav
  const prevBtn = document.getElementById('tour-prev');
  const nextBtn = document.getElementById('tour-next');
  if (prevBtn) prevBtn.addEventListener('click', () => goToStep(currentStep - 1));
  if (nextBtn) nextBtn.addEventListener('click', () => {
    if (isLast) endTour();
    else goToStep(currentStep + 1);
  });

  requestAnimationFrame(() => callout.classList.add('visible'));
}

function goToStep(idx) {
  if (idx < 0 || idx >= tourSteps.length) return;
  currentStep = idx;
  const step = tourSteps[idx];

  if (step.onEnter) step.onEnter();

  const target = getTargetEl(step);
  const rect = target ? target.getBoundingClientRect() : null;

  if (step.placement === 'center' && step.target === '#app') {
    // Full app — dim nothing, highlight entire app
    positionBackdrop(null);
    positionHighlight(null);
  } else if (!rect) {
    positionBackdrop(null);
    positionHighlight(null);
  } else {
    positionBackdrop(rect);
    positionHighlight(rect);
  }

  positionCallout(rect, step.placement, step);
}

function startTour() {
  tourActive = true;
  document.getElementById('tour-skip').style.display = 'block';
  goToStep(0);
}

function endTour() {
  tourActive = false;
  currentStep = -1;
  // Hide all tour elements
  ['tour-backdrop-top', 'tour-backdrop-right', 'tour-backdrop-bottom', 'tour-backdrop-left',
   'tour-highlight', 'tour-callout', 'tour-skip'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  enterInteractiveMode();
}

function enterInteractiveMode() {
  state.interactive = true;
  applyScenario('shipping');
  showDemoStrip();
}

function showDemoStrip() {
  if (document.getElementById('demo-strip')) {
    updateDemoStripActive();
    return;
  }

  // Create demo strip
  const strip = document.createElement('div');
  strip.className = 'demo-strip';
  strip.id = 'demo-strip';

  strip.innerHTML = `
    <span class="demo-strip-label">Scenarios:</span>
    <div class="demo-strip-buttons">
      ${Object.entries(SCENARIOS).map(([name, scenario]) => `
        <button class="demo-strip-btn ${name === state.scenario ? 'demo-strip-btn-active' : ''}"
                data-scenario="${name}">
          ${scenario.label}
        </button>
      `).join('')}
    </div>
    <div class="demo-strip-separator"></div>
    <span class="demo-strip-label">Heat:</span>
    <div class="demo-strip-buttons">
      ${HEAT_LABELS.map((label, i) => `
        <button class="demo-strip-btn ${i === state.heatLevel ? 'demo-strip-btn-active' : ''}"
                data-heat="${i}"
                style="${i > 0 ? `border-color: ${HEAT_COLORS[i]}40;` : ''}">
          ${label}
        </button>
      `).join('')}
    </div>
    <div class="demo-strip-separator"></div>
    <span style="color: var(--text-muted); font-size: 11px;">Switch lanes, then click dots to cycle status</span>
  `;

  document.body.appendChild(strip);

  // Adjust app height
  document.getElementById('app').style.height = 'calc(100vh - 36px)';

  // Wire buttons
  strip.querySelectorAll('[data-scenario]').forEach(btn => {
    btn.addEventListener('click', () => applyScenario(btn.dataset.scenario));
  });

  strip.querySelectorAll('.demo-strip-btn').forEach(btn => {
    if (!btn.dataset.heat) return;
    btn.addEventListener('click', () => {
      state.heatLevel = parseInt(btn.dataset.heat);
      render();
      updateDemoStripActive();
    });
  });
}

function updateDemoStripActive() {
  const strip = document.getElementById('demo-strip');
  if (!strip) return;
  strip.querySelectorAll('[data-scenario]').forEach(btn => {
    btn.classList.toggle('demo-strip-btn-active', btn.dataset.scenario === state.scenario);
  });
  strip.querySelectorAll('.demo-strip-btn').forEach(btn => {
    if (!btn.dataset.heat) return;
    const h = parseInt(btn.dataset.heat);
    btn.classList.toggle('demo-strip-btn-active', h === state.heatLevel);
  });
}

// ===== KEYBOARD NAVIGATION =====
document.addEventListener('keydown', (e) => {
  if (!tourActive) return;

  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    const step = tourSteps[currentStep];
    if (step && step.isFinal) endTour();
    else goToStep(currentStep + 1);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    goToStep(currentStep - 1);
  } else if (e.key === 'Escape') {
    e.preventDefault();
    endTour();
  }
});

// ===== INIT =====
function init() {
  renderSplashLogo();
  render();

  document.getElementById('btn-tour').addEventListener('click', () => {
    document.getElementById('splash').style.display = 'none';
    startTour();
  });

  document.getElementById('btn-skip').addEventListener('click', () => {
    document.getElementById('splash').style.display = 'none';
    enterInteractiveMode();
  });

  document.getElementById('tour-skip').addEventListener('click', endTour);

  // Handle resize during tour
  window.addEventListener('resize', () => {
    if (tourActive && currentStep >= 0) goToStep(currentStep);
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
