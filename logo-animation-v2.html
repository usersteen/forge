<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Forge Logo Animation v2</title>
<style>
  :root {
    --bg-deep: #080c14;
    --bg-sidebar: #0a0f1a;
    --heat-4: #ef4444;
    --heat-5: #b91c1c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  .scene {
    width: 800px;
    height: 300px;
    position: relative;
    overflow: hidden;
    background: var(--bg-deep);
  }

  /* Logo container — centered in scene */
  .sidebar-logo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 640px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 0 6px var(--heat-5)) drop-shadow(0 0 12px var(--heat-5));
  }

  .sidebar-logo svg {
    height: 32px;
    width: auto;
  }

  /* Embers spawn at random vertical positions already in motion */
  .forge-ember {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--heat-4);
    pointer-events: none;
    box-shadow: 0 0 4px var(--heat-4);
    animation: ember-rise var(--dur, 3s) ease-out infinite;
    animation-delay: var(--delay, 0s);
  }

  @keyframes ember-rise {
    0% {
      opacity: 0;
      transform: translateY(0) scale(0.5);
    }
    8% {
      opacity: 1;
      transform: translateY(calc(var(--rise) * 0.05)) scale(1);
    }
    60% {
      opacity: 0.7;
    }
    100% {
      opacity: 0;
      transform: translateY(var(--rise, -80px)) scale(0.2);
    }
  }
</style>
</head>
