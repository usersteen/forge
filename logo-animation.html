<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Forge Logo Animation</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 800;
const H = 300;
canvas.width = W;
canvas.height = H;

// We'll create two SVG versions: white-hot core and orange outer
const makeSvg = (fill) => `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60.7">
  <defs><style>.c { fill: ${fill}; }</style></defs>
  <path class="c" d="M51.59.91v2.73c0,.5-.41.91-.91.91h-27.01c-.5,0-.91.41-.91.91v21.7c0,.5.41.91.91.91h10.32c.5,0,.91-.41.91-.91v-.46c0-.5.41-.91.91-.91h1.21c.5,0,.91.41.91.91v7.28c0,.5-.41.91-.91.91h-1.21c-.5,0-.91-.41-.91-.91v-.45c0-.5-.41-.91-.91-.91h-10.32c-.5,0-.91.41-.91.91v21.7c0,.5.41.91.91.91h7.28c.5,0,.91.41.91.91v2.73c0,.5-.41.91-.91.91H.91c-.5,0-.91-.41-.91-.91v-2.73c0-.5.41-.91.91-.91h4.55c2.01,0,3.64-1.63,3.64-3.64V8.19c0-2.01-1.63-3.64-3.64-3.64H.91c-.5,0-.91-.41-.91-.91V.91C0,.41.41,0,.91,0h49.77c.5,0,.91.41.91.91Z"/>
  <path class="c" d="M109.68,4.55c.5,0,.91.41.91.91v49.77c0,.5-.41.91-.91.91-2.01,0-3.64,1.63-3.64,3.64,0,.5-.41.91-.91.91h-31.56c-.5,0-.91-.41-.91-.91,0-2.01-1.63-3.64-3.64-3.64-.5,0-.91-.41-.91-.91V5.46c0-.5.41-.91.91-.91,2.01,0,3.64-1.63,3.64-3.64,0-.5.41-.91.91-.91h31.56c.5,0,.91.41.91.91,0,2.01,1.63,3.64,3.64,3.64ZM96.93,55.23V5.46c0-.5-.41-.91-.91-.91h-13.35c-.5,0-.91.41-.91.91v49.77c0,.5.41.91.91.91h13.35c.5,0,.91-.41.91-.91Z"/>
  <path class="c" d="M188.1,56.14c.5,0,.91.41.91.91v2.73c0,.5-.41.91-.91.91h-16.39c-.5,0-.91-.41-.91-.91,0-2.01-1.63-3.64-3.64-3.64-.5,0-.91-.41-.91-.91v-21.7c0-.5-.41-.91-.91-.91h-13.35c-.5,0-.91.41-.91.91v21.7c0,.5-.41.91-.91.91-2.01,0-3.64,1.63-3.64,3.64,0,.5-.41.91-.91.91h-16.39c-.5,0-.91-.41-.91-.91v-2.73c0-.5.41-.91.91-.91h4.55c2.01,0,3.64-1.63,3.64-3.64V8.19c0-2.01-1.63-3.64-3.64-3.64h-4.55c-.5,0-.91-.41-.91-.91V.91c0-.5.41-.91.91-.91h45.22c.5,0,.91.41.91.91,0,2.01,1.63,3.64,3.64,3.64.5,0,.91.41.91.91v21.7c0,.5-.41.91-.91.91h-2.73c-.5,0-.91.41-.91.91v2.73c0,.5.41.91.91.91h2.73c.5,0,.91.41.91.91v18.97c0,2.01,1.63,3.64,3.64,3.64h4.55ZM151.99,28.07h13.35c.5,0,.91-.41.91-.91V5.46c0-.5-.41-.91-.91-.91h-13.35c-.5,0-.91.41-.91.91v21.7c0,.5.41.91.91.91Z"/>
  <path class="c" d="M257.72,28.98v2.73c0,.5-.41.91-.91.91h-7.28c-.5,0-.91.41-.91.91v21.7c0,.5-.41.91-.91.91-2.01,0-3.64,1.63-3.64,3.64,0,.5-.41.91-.91.91h-31.56c-.5,0-.91-.41-.91-.91,0-2.01-1.63-3.64-3.64-3.64-.5,0-.91-.41-.91-.91V5.46c0-.5.41-.91.91-.91,2.01,0,3.64-1.63,3.64-3.64,0-.5.41-.91.91-.91h31.56c.5,0,.91.41.91.91,0,2.01,1.63,3.64,3.64,3.64.5,0,.91.41.91.91v2.73c0,.5-.41.91-.91.91h-11.84c-.5,0-.91-.41-.91-.91v-2.73c0-.5-.41-.91-.91-.91h-13.35c-.5,0-.91.41-.91.91v49.77c0,.5.41.91.91.91h13.35c.5,0,.91-.41.91-.91v-21.7c0-.5-.41-.91-.91-.91h-7.28c-.5,0-.91-.41-.91-.91v-2.73c0-.5.41-.91.91-.91h30.04c.5,0,.91.41.91.91Z"/>
  <path class="c" d="M291.17,5.46v21.7c0,.5.41.91.91.91h10.32c.5,0,.91-.41.91-.91v-.46c0-.5.41-.91.91-.91h1.21c.5,0,.91.41.91.91v7.28c0,.5-.41.91-.91.91h-1.21c-.5,0-.91-.41-.91-.91v-.45c0-.5-.41-.91-.91-.91h-10.32c-.5,0-.91.41-.91.91v21.7c0,.5.41.91.91.91h27.01c.5,0,.91.41.91.91v2.73c0,.5-.41.91-.91.91h-49.77c-.5,0-.91-.41-.91-.91v-2.73c0-.5.41-.91.91-.91h4.55c2.01,0,3.64-1.63,3.64-3.64V8.19c0-2.01-1.63-3.64-3.64-3.64h-4.55c-.5,0-.91-.41-.91-.91V.91c0-.5.41-.91.91-.91h49.77c.5,0,.91.41.91.91v2.73c0,.5-.41.91-.91.91h-27.01c-.5,0-.91.41-.91.91Z"/>
</svg>`;

// White-hot center logo
const logoWhite = new Image();
logoWhite.src = URL.createObjectURL(new Blob([makeSvg('#ffffff')], { type: 'image/svg+xml' }));

// Yellow-hot layer
const logoYellow = new Image();
logoYellow.src = URL.createObjectURL(new Blob([makeSvg('#fff4c8')], { type: 'image/svg+xml' }));

// Orange outer glow layer
const logoOrange = new Image();
logoOrange.src = URL.createObjectURL(new Blob([makeSvg('#ff8c00')], { type: 'image/svg+xml' }));

// Red outermost glow
const logoRed = new Image();
logoRed.src = URL.createObjectURL(new Blob([makeSvg('#ff4500')], { type: 'image/svg+xml' }));

const logoW = 640;
const logoH = (60.7 / 320) * logoW;
const logoX = (W - logoW) / 2;
const logoY = (H - logoH) / 2 + 15;

// Off-screen canvas for pixel sampling
const offCanvas = document.createElement('canvas');
offCanvas.width = W;
offCanvas.height = H;
const offCtx = offCanvas.getContext('2d');

let logoPixels = null;
let loaded = 0;
const onLoad = () => {
  loaded++;
  if (loaded < 4) return;
  offCtx.drawImage(logoWhite, logoX, logoY, logoW, logoH);
  logoPixels = offCtx.getImageData(0, 0, W, H).data;
  requestAnimationFrame(animate);
};
logoWhite.onload = onLoad;
logoYellow.onload = onLoad;
logoOrange.onload = onLoad;
logoRed.onload = onLoad;

// --- EMBER PARTICLES ---
class Ember {
  constructor() {
    this.reset();
  }

  reset() {
    // Spawn from logo surface
    if (logoPixels) {
      let attempts = 0;
      do {
        this.x = logoX + Math.random() * logoW;
        this.y = logoY + Math.random() * logoH;
        const px = Math.floor(this.x);
        const py = Math.floor(this.y);
        const idx = (py * W + px) * 4;
        if (logoPixels[idx + 3] > 128) break;
        attempts++;
      } while (attempts < 50);
    } else {
      this.x = logoX + Math.random() * logoW;
      this.y = logoY + Math.random() * logoH;
    }

    this.originY = this.y;
    this.size = 0.8 + Math.random() * 2.5;
    this.speedY = -(0.4 + Math.random() * 1.5);
    this.speedX = (Math.random() - 0.5) * 0.7;
    this.life = 1.0;
    this.decay = 0.003 + Math.random() * 0.009;
    this.wobbleAmp = 0.3 + Math.random() * 0.8;
    this.wobbleFreq = 0.02 + Math.random() * 0.03;
    this.wobbleOffset = Math.random() * Math.PI * 2;
    this.t = 0;

    // Hot forge colors: white-hot near logo, cooling to orange/red as they rise
    // Start temperature (1.0 = white hot, 0.0 = red)
    this.temp = 0.5 + Math.random() * 0.5;
  }

  getColor(temp) {
    // White -> Yellow -> Orange -> Red as temp drops
    if (temp > 0.8) {
      // White-hot
      const t = (temp - 0.8) / 0.2;
      const r = 255;
      const g = Math.floor(240 + t * 15);
      const b = Math.floor(180 + t * 75);
      return `rgb(${r},${g},${b})`;
    } else if (temp > 0.5) {
      // Yellow-orange
      const t = (temp - 0.5) / 0.3;
      const r = 255;
      const g = Math.floor(120 + t * 120);
      const b = Math.floor(20 + t * 160);
      return `rgb(${r},${g},${b})`;
    } else if (temp > 0.2) {
      // Orange-red
      const t = (temp - 0.2) / 0.3;
      const r = Math.floor(200 + t * 55);
      const g = Math.floor(40 + t * 80);
      const b = Math.floor(5 + t * 15);
      return `rgb(${r},${g},${b})`;
    } else {
      // Deep red, fading
      const t = temp / 0.2;
      return `rgb(${Math.floor(140 + t * 60)},${Math.floor(t * 40)},0)`;
    }
  }

  update() {
    this.t++;
    this.x += this.speedX + Math.sin(this.t * this.wobbleFreq + this.wobbleOffset) * this.wobbleAmp;
    this.y += this.speedY;
    this.life -= this.decay;
    this.temp -= 0.004; // Cool down as it rises

    this.speedY -= 0.003;

    if (this.life < 0.3) {
      this.size *= 0.997;
    }

    if (this.life <= 0 || this.size < 0.2 || this.temp < 0) {
      this.reset();
    }
  }

  draw(ctx) {
    const alpha = Math.min(this.life, 1);
    const color = this.getColor(Math.max(this.temp, 0));

    // Outer glow
    ctx.save();
    ctx.globalAlpha = alpha * 0.3;
    ctx.shadowColor = color;
    ctx.shadowBlur = 12 + this.size * 4;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Core
    ctx.save();
    ctx.globalAlpha = alpha * 0.9;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();

    // White-hot center (only for hot embers)
    if (this.temp > 0.6) {
      ctx.globalAlpha = alpha * (this.temp - 0.6) / 0.4;
      ctx.fillStyle = '#fffef0';
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 0.45, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// --- SPARK PARTICLES (fast, small, shoot upward) ---
class Spark {
  constructor() {
    this.reset();
  }
  reset() {
    if (logoPixels) {
      let attempts = 0;
      do {
        this.x = logoX + Math.random() * logoW;
        this.y = logoY + Math.random() * logoH;
        const px = Math.floor(this.x);
        const py = Math.floor(this.y);
        const idx = (py * W + px) * 4;
        if (logoPixels[idx + 3] > 128) break;
        attempts++;
      } while (attempts < 50);
    } else {
      this.x = logoX + Math.random() * logoW;
      this.y = logoY + Math.random() * logoH;
    }
    this.size = 0.5 + Math.random() * 1.2;
    this.speedY = -(2 + Math.random() * 3);
    this.speedX = (Math.random() - 0.5) * 2;
    this.life = 1.0;
    this.decay = 0.015 + Math.random() * 0.02;
    this.gravity = 0.02;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.speedY += this.gravity; // slight arc
    this.speedX *= 0.99;
    this.life -= this.decay;
    if (this.life <= 0) this.reset();
  }
  draw(ctx) {
    const alpha = this.life;
    // Sparks are always bright white-yellow
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 6;
    ctx.fillStyle = this.life > 0.5 ? '#fffff0' : '#ffaa00';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// --- HEAT SHIMMER (big soft glow blobs) ---
class HeatShimmer {
  constructor() { this.reset(); }
  reset() {
    this.x = logoX - 20 + Math.random() * (logoW + 40);
    this.y = logoY - 10 + Math.random() * (logoH + 20);
    this.size = 30 + Math.random() * 60;
    this.speedY = -(0.05 + Math.random() * 0.2);
    this.life = 1.0;
    this.decay = 0.004 + Math.random() * 0.004;
    this.t = Math.random() * 100;
  }
  update() {
    this.t++;
    this.y += this.speedY;
    this.x += Math.sin(this.t * 0.015) * 0.3;
    this.life -= this.decay;
    if (this.life <= 0) this.reset();
  }
  draw(ctx) {
    const alpha = this.life * 0.08;
    ctx.save();
    ctx.globalAlpha = alpha;
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
    grad.addColorStop(0, '#ffaa33');
    grad.addColorStop(0.4, '#ff660044');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// Create particles
const embers = Array.from({ length: 150 }, () => new Ember());
const sparks = Array.from({ length: 30 }, () => new Spark());
const shimmers = Array.from({ length: 20 }, () => new HeatShimmer());

// Stagger embers
embers.forEach(e => {
  e.life = Math.random();
  e.temp = 0.3 + Math.random() * 0.7;
  e.y = e.originY - (1 - e.life) * 100;
});

let frame = 0;

function animate() {
  frame++;
  ctx.clearRect(0, 0, W, H);

  // Near-black background with very subtle warm tint
  ctx.fillStyle = '#0a0806';
  ctx.fillRect(0, 0, W, H);

  // --- AMBIENT FORGE GLOW (behind everything) ---
  // Large soft radial glow centered on logo
  ctx.save();
  const ambientPulse = 0.85 + Math.sin(frame * 0.02) * 0.15;
  ctx.globalAlpha = 0.15 * ambientPulse;
  const ambGrad = ctx.createRadialGradient(W/2, logoY + logoH/2, 20, W/2, logoY + logoH/2, 300);
  ambGrad.addColorStop(0, '#ff6600');
  ambGrad.addColorStop(0.3, '#ff330055');
  ambGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = ambGrad;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // Heat shimmers
  shimmers.forEach(s => { s.update(); s.draw(ctx); });

  // --- LOGO RENDERING (forge heat layers) ---
  const pulse = Math.sin(frame * 0.025);
  const pulse2 = Math.sin(frame * 0.04 + 1);

  // Layer 1: Red outermost glow (large blur)
  ctx.save();
  ctx.shadowColor = '#ff2200';
  ctx.shadowBlur = 30 + pulse * 8;
  ctx.globalAlpha = 0.5;
  ctx.drawImage(logoRed, logoX, logoY, logoW, logoH);
  ctx.restore();

  // Layer 2: Orange glow
  ctx.save();
  ctx.shadowColor = '#ff6600';
  ctx.shadowBlur = 18 + pulse2 * 5;
  ctx.globalAlpha = 0.6;
  ctx.drawImage(logoOrange, logoX, logoY, logoW, logoH);
  ctx.restore();

  // Layer 3: Yellow-hot
  ctx.save();
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 10 + pulse * 3;
  ctx.globalAlpha = 0.8;
  ctx.drawImage(logoYellow, logoX, logoY, logoW, logoH);
  ctx.restore();

  // Layer 4: White-hot core (crisp)
  ctx.save();
  ctx.shadowColor = '#fff8e0';
  ctx.shadowBlur = 4 + pulse2 * 2;
  ctx.globalAlpha = 0.95 + pulse * 0.05;
  ctx.drawImage(logoWhite, logoX, logoY, logoW, logoH);
  ctx.restore();

  // Embers (behind and in front — split for depth)
  embers.slice(0, 75).forEach(e => { e.update(); e.draw(ctx); });

  // Extra logo pass for intensity (additive feel)
  ctx.save();
  ctx.globalAlpha = 0.15 + pulse2 * 0.05;
  ctx.globalCompositeOperation = 'lighter';
  ctx.drawImage(logoYellow, logoX, logoY, logoW, logoH);
  ctx.restore();

  // Front embers
  embers.slice(75).forEach(e => { e.update(); e.draw(ctx); });

  // Sparks on top of everything
  sparks.forEach(s => { s.update(); s.draw(ctx); });

  requestAnimationFrame(animate);
}
</script>
</body>
</html>
