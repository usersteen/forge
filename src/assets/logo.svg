<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Flame top -->
  <rect x="14" y="1" width="4" height="1" fill="#F59E0B"/>
  <rect x="13" y="2" width="6" height="1" fill="#F59E0B"/>
  <rect x="12" y="3" width="8" height="1" fill="#F59E0B"/>
  <rect x="11" y="4" width="10" height="1" fill="#F59E0B"/>
  <rect x="10" y="5" width="12" height="1" fill="#F59E0B"/>
  <rect x="9" y="6" width="14" height="1" fill="#F59E0B"/>
  <rect x="8" y="7" width="16" height="1" fill="#F59E0B"/>
  <rect x="7" y="8" width="18" height="1" fill="#F59E0B"/>
  <rect x="6" y="9" width="20" height="2" fill="#F59E0B"/>
  <rect x="5" y="11" width="22" height="2" fill="#F59E0B"/>
