  <rect x="5" y="24" width="6" height="2" fill="#F59E0B"/>
  <rect x="15" y="24" width="12" height="2" fill="#F59E0B"/>
  <!-- Flame base -->
  <rect x="6" y="26" width="20" height="1" fill="#F59E0B"/>
  <rect x="7" y="27" width="18" height="1" fill="#F59E0B"/>
  <rect x="8" y="28" width="16" height="1" fill="#F59E0B"/>
